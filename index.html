<!DOCTYPE html>
<html lang="en" class="bg-[#121212] text-[#FAFAFA] select-none">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bailey's awesome site</title>
  <link href="/src/style.css" rel="stylesheet">
</head>
<body class="w-full h-screen">
  <div id="app" class="flex flex-col h-full">
    <div id="hamburger" class="absolute left-2 top-2 z-10 cursor-pointer p-2 rounded">
      ☰
    </div>
    <div class="absolute w-full">
      <div class="flex justify-end mr-4">
        <p id="score-add" class="hidden text-2xl mr-4 text-green-400">
          +1
        </p>
        <p id="score-counter" class="text-2xl">
          0
        </p>
      </div>
    </div>
    <div id="header" class="flex justify-center">
      Welcome to my awesome profile!
    </div>
    <div class="flex items-center mt-24 flex-col">
      <p class="mt-6 text-3xl">Next update:</p>
      <p class="mt-4">Super interactivity?</p>
    </div>
    <div class="flex items-end flex-1">
      <button id="show-load" class="bg-gray-400 px-5 py-0.5 ml-2 rounded-xl cursor-pointer absolute left-0">Input save</button>
      <button id="show-save" class="bg-gray-400 px-5 py-0.5 mr-2 rounded-xl cursor-pointer absolute right-0">Show save</button>
    </div>
    <div id="hash-banner" class="hidden absolute bg-gray-600 top-1/2 right-1/2 translate-x-1/2 py-12 px-4 rounded-xl">
      <p>save hash: <span class="select-text" id="save-hash">abc-1234</span></p>
    </div>
    <div id="load-banner" class="hidden absolute bg-gray-600 top-1/2 right-1/2 translate-x-1/2 py-12 px-4 rounded-xl">
      <input id="save-hash-input" class="text-white bg-[#1e1e1e] rounded-xl" type="text" placeholder="input save here">
      <input id="load-data-btn" class="bg-gray-400 px-5 py-0.5 ml-2 rounded-xl cursor-pointer" type="button" value="load">
    </div>
    <div class="z-50 hidden absolute bg-amber-600" id="purchase-tooltip">
      <p>
        Purchase for 200 score
      </p>
    </div>
    <div id="sidebar" class="bg-gray-700 hidden absolute left-0 h-full w-auto top-0 z-20">
      <div id="items" class="text-xl flex flex-col justify-around items-center h-full">
        <p class="cursor-pointer" id="home-btn">
          Home
        </p>
        <p class="cursor-pointer" id="interactland-btn">
          Interactland
        </p>
        <p class="cursor-pointer" id="close-sidebar">
          Close
        </p>
      </div>
    </div>
  </div>
</body>
<script type="module" src="/src/main.ts"></script>
</html>
